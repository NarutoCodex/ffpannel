<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>FF PANELS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#060d18;--bg2:#0a1628;--bg3:#0f2748;--gold:#f59e0b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--text:#fff;--muted:#94a3b8;--dim:#64748b;--border:#0f2748}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}

/* ── ANIMATIONS ── */
@keyframes pulseGold{0%,100%{box-shadow:0 0 8px rgba(245,158,11,.4)}50%{box-shadow:0 0 22px rgba(245,158,11,.8),0 0 40px rgba(245,158,11,.3)}}
@keyframes pulseBlue{0%,100%{box-shadow:0 0 8px rgba(59,130,246,.4)}50%{box-shadow:0 0 22px rgba(59,130,246,.8),0 0 40px rgba(59,130,246,.3)}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 6px rgba(16,185,129,.3)}50%{box-shadow:0 0 18px rgba(16,185,129,.7)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(.94)}100%{transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes borderFlow{0%,100%{border-color:rgba(245,158,11,.4)}50%{border-color:rgba(245,158,11,1)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
@keyframes menuItemIn{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes cardGlow{0%,100%{box-shadow:0 2px 12px rgba(59,130,246,.08)}50%{box-shadow:0 4px 24px rgba(59,130,246,.18)}}
@keyframes goldPulseText{0%,100%{text-shadow:0 0 8px rgba(245,158,11,.3)}50%{text-shadow:0 0 18px rgba(245,158,11,.7),0 0 30px rgba(245,158,11,.2)}}

.fade-up{animation:fadeUp .35s ease both}

/* ── LAYOUT ── */
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(6,13,24,.97);border-bottom:1px solid rgba(245,158,11,.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.hdr-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800}
.hdr-logo .ico{width:32px;height:32px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;animation:pulseBlue 3s infinite}
.hdr-logo span{color:var(--gold);animation:goldPulseText 3s infinite}
.hdr-bal{background:rgba(245,158,11,.1);border:1px solid var(--gold);border-radius:20px;padding:6px 14px;color:var(--gold);font-weight:700;font-size:13px;text-decoration:none;animation:borderFlow 2.5s infinite;transition:.2s}
.hdr-bal:active{transform:scale(.95)}
.menu-btn{background:transparent;border:none;color:#fff;cursor:pointer;padding:6px;transition:.2s;display:flex;align-items:center;justify-content:center;border-radius:8px}
.menu-btn:active{background:rgba(255,255,255,.08);transform:scale(.88)}

/* ── SIDE MENU — opens from LEFT (where 3-dot is on left side) ── */
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;backdrop-filter:blur(6px)}
.menu-overlay.open{display:block;animation:overlayIn .25s ease}
.side-menu{
  position:fixed;top:0;left:0;bottom:0;
  width:78%;max-width:320px;
  background:linear-gradient(160deg,#080f1e,#0b1830);
  border-right:1px solid rgba(245,158,11,.12);
  z-index:501;display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  box-shadow:8px 0 40px rgba(0,0,0,.6)
}
.side-menu.open{transform:translateX(0)}
.side-menu-hdr{padding:28px 20px 20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
.side-menu-hdr .brand{display:flex;align-items:center;gap:10px}
.side-menu-hdr .brand .logo-box{width:38px;height:38px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px rgba(59,130,246,.4)}
.side-menu-hdr .brand h3{font-size:16px;font-weight:800}
.side-menu-hdr .brand h3 span{color:var(--gold)}
.close-menu{background:rgba(255,255,255,.06);border:none;color:#94a3b8;width:34px;height:34px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.close-menu:active{transform:scale(.88);background:rgba(255,255,255,.12)}
.side-menu-body{flex:1;overflow-y:auto;padding:12px 0}
.menu-section-title{color:#475569;font-size:9px;letter-spacing:3px;font-weight:700;padding:14px 20px 6px}
.menu-item{display:flex;align-items:center;gap:14px;padding:13px 20px;text-decoration:none;color:#e2e8f0;font-size:14px;font-weight:600;transition:.2s;position:relative;opacity:0}
.side-menu.open .menu-item{animation:menuItemIn .35s ease forwards}
.side-menu.open .menu-item:nth-child(1){animation-delay:.05s}
.side-menu.open .menu-item:nth-child(2){animation-delay:.1s}
.side-menu.open .menu-item:nth-child(3){animation-delay:.15s}
.side-menu.open .menu-item:nth-child(4){animation-delay:.2s}
.side-menu.open .menu-item:nth-child(5){animation-delay:.25s}
.side-menu.open .menu-item:nth-child(6){animation-delay:.3s}
.side-menu.open .menu-item:nth-child(7){animation-delay:.35s}
.menu-item:active{background:rgba(255,255,255,.05)}
.menu-item.active{color:var(--gold);background:rgba(245,158,11,.06)}
.menu-item.active::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--gold);border-radius:3px 0 0 3px;box-shadow:0 0 8px var(--gold)}
.menu-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-icon.blue{background:rgba(37,99,235,.15);box-shadow:inset 0 0 0 1px rgba(37,99,235,.2)}
.menu-icon.gold{background:rgba(245,158,11,.12);box-shadow:inset 0 0 0 1px rgba(245,158,11,.2)}
.menu-icon.green{background:rgba(16,185,129,.12);box-shadow:inset 0 0 0 1px rgba(16,185,129,.2)}
.menu-icon.red{background:rgba(239,68,68,.12);box-shadow:inset 0 0 0 1px rgba(239,68,68,.2)}
.menu-icon.purple{background:rgba(124,58,237,.15);box-shadow:inset 0 0 0 1px rgba(124,58,237,.2)}
.menu-icon.cyan{background:rgba(6,182,212,.12);box-shadow:inset 0 0 0 1px rgba(6,182,212,.2)}
.menu-divider{height:1px;background:rgba(255,255,255,.05);margin:8px 20px}
.side-menu-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.05)}
.menu-user-chip{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.18);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;animation:pulseGold 3s infinite}
.menu-avatar{width:36px;height:36px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.menu-user-info p{font-size:13px;font-weight:700;margin-bottom:1px}
.menu-user-info span{color:var(--gold);font-size:11px;font-weight:700}

/* ── BOTTOM NAV ── */
.bnav{display:flex;background:rgba(9,15,30,.97);border-top:1px solid rgba(255,255,255,.06);padding:10px 0 18px;position:sticky;bottom:0;z-index:100;backdrop-filter:blur(14px)}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--dim);font-size:10px;font-weight:600;padding:4px 0;transition:all .25s;position:relative}
.bnav a.active{color:var(--gold)}
.bnav a.active::before{content:'';position:absolute;top:-1px;left:28%;right:28%;height:2px;background:var(--gold);border-radius:2px;box-shadow:0 0 10px var(--gold),0 0 20px rgba(245,158,11,.4)}
.bnav-icon{width:24px;height:24px;transition:all .25s}
.bnav a.active .bnav-icon{filter:drop-shadow(0 0 6px rgba(245,158,11,.7));transform:scale(1.12)}
.bnav a:active{transform:scale(.88)}

/* ── FLASH ── */
.flash{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:8px;font-weight:600;word-break:break-all;animation:fadeUp .3s ease}
.flash.success{background:#052e16;border:1px solid var(--green);color:var(--green)}
.flash.error{background:#2d0a0a;border:1px solid var(--red);color:var(--red)}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;transition:.2s}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-block;text-align:center;text-decoration:none;position:relative;overflow:hidden}
.btn:active{animation:pop .15s ease}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:.2s;border-radius:inherit}
.btn:active::after{opacity:1}
.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 4px 15px rgba(37,99,235,.3)}
.btn-blue:hover{box-shadow:0 4px 25px rgba(37,99,235,.5);transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 15px rgba(245,158,11,.3)}
.btn-gold:hover{box-shadow:0 4px 25px rgba(245,158,11,.5);transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,#059669,#047857);color:#fff;box-shadow:0 4px 15px rgba(5,150,105,.3)}
.btn-red{background:#ef4444;color:#fff}
.btn-dark{background:#1e3a5f;color:#94a3b8}
.btn-w{width:100%;margin-top:8px}
.btn-glow-gold{animation:pulseGold 2.5s infinite}
.btn-glow-blue{animation:pulseBlue 2.5s infinite}

/* ── INPUTS ── */
.inp{width:100%;background:var(--bg3);border:1px solid #1e3a5f;border-radius:10px;padding:13px 16px;color:#fff;font-size:15px;outline:none;transition:.2s;margin-bottom:10px}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.lbl{color:var(--muted);font-size:11px;letter-spacing:2px;margin-bottom:6px;display:block;font-weight:600}
.scrl{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
.page-title{font-size:18px;font-weight:800;margin-bottom:14px}

/* ── SHIMMER BUTTON ── */
.btn-shimmer{background:linear-gradient(90deg,#1d4ed8,#7c3aed,#2563eb,#7c3aed,#1d4ed8);background-size:300% auto;color:#fff;animation:shimmer 3s linear infinite;box-shadow:0 4px 20px rgba(124,58,237,.4)}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}

<!-- SIDE MENU — LEFT SIDE -->
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
<div class="side-menu" id="sideMenu">
  <div class="side-menu-hdr">
    <div class="brand">
      <div class="logo-box">⚡</div>
      <h3>FF <span>PANELS</span></h3>
    </div>
    <button class="close-menu" onclick="closeMenu()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="side-menu-body">
    <p class="menu-section-title">NAVIGATION</p>
    <a href="/home" class="menu-item {% block mn_home %}{% endblock %}">
      <div class="menu-icon blue">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      Home
    </a>
    <a href="/store" class="menu-item {% block mn_store %}{% endblock %}">
      <div class="menu-icon purple">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      </div>
      Store
    </a>
    <a href="/keys" class="menu-item {% block mn_keys %}{% endblock %}">
      <div class="menu-icon gold">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="15" r="4"/><path d="M12 15h8M16 11v8"/></svg>
      </div>
      My Keys
    </a>
    <a href="/add-money" class="menu-item {% block mn_money %}{% endblock %}">
      <div class="menu-icon green">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      </div>
      Add Money
    </a>
    <div class="menu-divider"></div>
    <p class="menu-section-title">ACCOUNT</p>
    <a href="/profile" class="menu-item {% block mn_profile %}{% endblock %}">
      <div class="menu-icon blue">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      Profile
    </a>
    <a href="https://t.me/narutocodexofc" target="_blank" class="menu-item">
      <div class="menu-icon cyan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </div>
      <span style="color:#06b6d4">24/7 Support</span>
    </a>
    <a href="/logout" class="menu-item">
      <div class="menu-icon red">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
      <span style="color:#ef4444">Logout</span>
    </a>
  </div>
  <div class="side-menu-footer">
    <div class="menu-user-chip">
      <div class="menu-avatar">U</div>
      <div class="menu-user-info">
        <p>FF Panels User</p>
        <span>⚡ Active Account</span>
      </div>
    </div>
  </div>
</div>

<script>
function openMenu(){
  document.getElementById('menuOverlay').classList.add('open');
  document.getElementById('sideMenu').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMenu(){
  document.getElementById('sideMenu').classList.remove('open');
  setTimeout(function(){
    document.getElementById('menuOverlay').classList.remove('open');
    document.body.style.overflow='';
  },320);
}
</script>
</body>
</html>
