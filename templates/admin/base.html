<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>FF Panels - Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#060d18;--bg2:#0a1628;--bg3:#0f2748;--gold:#f59e0b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--border:#0f2748;--text:#fff;--muted:#94a3b8;--dim:#64748b}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 8px rgba(245,158,11,.3)}50%{box-shadow:0 0 20px rgba(245,158,11,.7)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(.95)}100%{transform:scale(1)}}
.fade-up{animation:fadeUp .3s ease both}
/* TOP */
.adm-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(6,13,24,.97);border-bottom:1px solid rgba(245,158,11,.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.adm-logo{font-size:15px;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:8px}
.adm-logo-ico{width:30px;height:30px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.adm-logo small{color:var(--dim);font-size:10px;font-weight:400;display:block;margin-top:1px}
/* BOTTOM NAV */
.adm-bnav{display:flex;background:rgba(8,15,30,.97);border-top:1px solid rgba(255,255,255,.06);padding:6px 0 14px;position:fixed;bottom:0;left:0;right:0;z-index:100;backdrop-filter:blur(12px)}
.adm-bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--dim);font-size:9px;padding:4px 2px;transition:.2s;position:relative}
.adm-bnav a.active{color:var(--gold)}
.adm-bnav a.active::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:var(--gold);border-radius:2px;box-shadow:0 0 6px var(--gold)}
.adm-bnav a .ico{font-size:20px;transition:.2s}
.adm-bnav a.active .ico{transform:scale(1.1)}
.adm-bnav a.notify::after{content:attr(data-count);position:absolute;top:0;right:12%;background:#ef4444;color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
/* CONTENT */
.adm-content{padding:14px;padding-bottom:88px;max-width:600px;margin:0 auto}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.flash{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:10px;font-weight:600;word-break:break-all;animation:fadeUp .3s ease}
.flash.success{background:#052e16;border:1px solid var(--green);color:var(--green)}
.flash.error{background:#2d0a0a;border:1px solid var(--red);color:var(--red)}
/* BUTTONS */
.btn{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;text-decoration:none;display:inline-block;text-align:center}
.btn:active{animation:pop .15s ease}
.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 3px 12px rgba(37,99,235,.3)}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 3px 12px rgba(245,158,11,.3)}
.btn-green{background:linear-gradient(135deg,#059669,#047857);color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-dark{background:#1e3a5f;color:#94a3b8}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-w{width:100%;margin-top:8px}
/* INPUTS */
.inp{width:100%;background:var(--bg3);border:1px solid #1e3a5f;border-radius:8px;padding:11px 14px;color:#fff;font-size:14px;outline:none;margin-bottom:10px;transition:.2s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
textarea.inp{resize:vertical;min-height:80px}
.lbl{color:var(--muted);font-size:10px;letter-spacing:2px;margin-bottom:5px;display:block;font-weight:700}
/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;animation:fadeUp .35s ease both}
</style>
</head>
<body>
<div class="adm-top">
  <div class="adm-logo">
    <div class="adm-logo-ico">⚡</div>
    <div>FF PANELS<small>Admin Panel</small></div>
  </div>
  <a href="/logout" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;text-decoration:none">🚪 Out</a>
</div>
<div class="adm-content">
  {% with msgs = get_flashed_messages(with_categories=true) %}{% for c,m in msgs %}<div class="flash {{c}}">{{m}}</div>{% endfor %}{% endwith %}
  {% block content %}{% endblock %}
</div>
<nav class="adm-bnav">
  <a href="/admin" class="{{ 'active' if request.path=='/admin' else '' }}"><span class="ico">📊</span>Home</a>
  <a href="/admin/categories" class="{{ 'active' if 'categories' in request.path else '' }}"><span class="ico">📦</span>Products</a>
  <a href="/admin/key-requests" class="{{ 'active' if 'key-requests' in request.path else '' }}" {% if pending_keys is defined and pending_keys>0 %}data-count="{{ pending_keys }}" class="notify"{% endif %}><span class="ico">🔑</span>Keys</a>
  <a href="/admin/payments" class="{{ 'active' if 'payments' in request.path else '' }}"><span class="ico">💳</span>Payments</a>
  <a href="/admin/users" class="{{ 'active' if 'users' in request.path else '' }}"><span class="ico">👥</span>Users</a>
  <a href="/admin/reseller-price" class="{{ 'active' if 'reseller' in request.path else '' }}"><span class="ico">⭐</span>Reseller</a>
</nav>
</body>
</html>
